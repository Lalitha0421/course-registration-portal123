<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Course | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white p-4">
                    <h4 class="mb-0"><i class="bi bi-journal-plus me-2"></i> Add New Course</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Course Code</label>
                            <input type="text" name="course_code" class="form-control" placeholder="e.g. CSL101" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Course Title</label>
                            <input type="text" name="course_title" class="form-control" placeholder="e.g. Introduction to Programming" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Type</label>
                                <select name="course_type" class="form-select">
                                    <option value="DC">Departmental Core (DC)</option>
                                    <option value="DE">Departmental Elective (DE)</option>
                                    <option value="OC">Open Elective (OC)</option>
                                    <option value="BS">Basic Science (BS)</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Credits</label>
                                <input type="number" name="credits" class="form-control" min="1" max="10" value="3" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Year</label>
                                <select name="year" class="form-select">
                                    <option value="1">Year 1</option>
                                    <option value="2">Year 2</option>
                                    <option value="3">Year 3</option>
                                    <option value="4">Year 4</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Semester</label>
                                <select name="semester" class="form-select">
                                    <option value="Summer">Summer</option>
                                    <option value="Winter">Winter</option>
                                </select>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="/admin/dashboard" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary px-4">Create Course</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
