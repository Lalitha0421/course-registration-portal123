<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | VNIT Course Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; }
        .vnit-blue { background: #003366; color: white; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; }
        .btn-update { background: #003366; color: white; border-radius: 12px; padding: 12px 30px; font-weight: 600; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark vnit-blue">
    <div class="container">
        <a class="navbar-brand" href="/student/dashboard"><i class="bi bi-arrow-left me-2"></i> Back to Dashboard</a>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-5">
                <h2 class="fw-800 mb-4">Profile Settings</h2>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Full Name</label>
                            <input type="text" class="form-control" value="{{ student[3] }}" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Enrollment Number</label>
                            <input type="text" class="form-control" value="{{ student[2] }}" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Email Address</label>
                            <input type="email" name="email" class="form-control" value="{{ student[4] }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Mobile Number</label>
                            <input type="text" name="mobile" class="form-control" value="{{ student[5] or '' }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-muted small fw-bold">Current Address</label>
                            <textarea name="address" class="form-control" rows="3">{{ student[10] or '' }}</textarea>
                        </div>
                        
                        <hr class="my-4">
                        
                        <h5 class="fw-bold mb-3">Security</h5>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">New Password (leave blank to keep current)</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••">
                        </div>
                        
                        <div class="col-12 mt-5">
                            <button type="submit" class="btn btn-update w-100">
                                Save Profile Changes
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
