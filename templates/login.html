<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Portal Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 450px; margin: 80px auto; padding: 30px; background: white; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 30px; color: #0d6efd; }
        .form-label { font-weight: 500; }
        .btn-login { width: 100%; padding: 12px; font-size: 1.1rem; }
        .links { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Course Portal Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
        <div class="mb-3">
            <label class="form-label">Login ID</label>
            <input type="text" name="login_id" class="form-control" value="{{ request.form.login_id }}" required autofocus>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mb-4">
            <label class="form-label">User Role</label>
            <select name="role" class="form-select" required>
                <option value="" disabled selected>Select Role</option>
                <option value="student" {% if request.form.role == 'student' %}selected{% endif %}>Student</option>
                <option value="admin" {% if request.form.role == 'admin' %}selected{% endif %}>Admin</option>
                <option value="faculty" {% if request.form.role == 'faculty' %}selected{% endif %}>Faculty</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success btn-login">Login</button>
    </form>

    <div class="links">
        <p><a href="/register">New User? Register Here</a></p>
        <p><a href="/forgot_password">Forgot Password?</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
