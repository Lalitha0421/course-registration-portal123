<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login | VNIT Nagpur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --vnit-blue: #003366;
            --vnit-orange: #ff9933;
        }
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card { 
            width: 100%;
            max-width: 420px; 
            padding: 2.5rem; 
            background: white; 
            border-radius: 1.5rem; 
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.175); 
        }
        .vnit-header { 
            text-align: center; 
            margin-bottom: 2rem; 
        }
        .vnit-header h2 { 
            color: var(--vnit-blue); 
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
        }
        .vnit-header p {
            color: #6c757d;
            font-size: 0.875rem;
        }
        .form-label { font-weight: 600; color: #495057; font-size: 0.875rem; text-transform: uppercase; }
        .form-control, .form-select {
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid #dee2e6;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(0, 51, 102, 0.1);
            border-color: var(--vnit-blue);
        }
        .btn-login { 
            width: 100%; 
            padding: 0.875rem; 
            font-size: 1rem; 
            font-weight: 600;
            background-color: var(--vnit-blue);
            border: none;
            border-radius: 0.75rem;
            margin-top: 1rem;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background-color: #002244;
            transform: translateY(-1px);
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
        }
        .footer-links { text-align: center; margin-top: 2rem; border-top: 1px solid #eee; padding-top: 1.5rem; }
        .footer-links a { 
            color: var(--vnit-blue); 
            text-decoration: none; 
            font-size: 0.875rem;
            font-weight: 500;
        }
        .footer-links a:hover { text-decoration: underline; }
        .alert { border-radius: 0.75rem; font-size: 0.875rem; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="vnit-header">
        <h2>Course Portal</h2>
        <p>Visvesvaraya National Institute of Technology</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
        <div class="mb-3">
            <label class="form-label">Login / Enrollment ID</label>
            <input type="text" name="login_id" class="form-control" placeholder="Enter ID" value="{{ request.form.login_id or '' }}" required autofocus>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Account Role</label>
            <select name="role" class="form-select" required>
                <option value="" disabled selected>Select Account Type</option>
                <option value="student" {% if request.form.role == 'student' %}selected{% endif %}>Student</option>
                <option value="admin" {% if request.form.role == 'admin' %}selected{% endif %}>Administrator</option>
                <option value="faculty" {% if request.form.role == 'faculty' %}selected{% endif %}>Faculty</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary btn-login">Sign In</button>
    </form>

    <div class="footer-links pt-3 mt-4">
        <div class="d-flex justify-content-between">
            <a href="/student_application">Create New Account</a>
            <a href="/forgot_password" class="text-muted small">Forgot Password?</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
