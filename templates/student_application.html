<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>New Student Registration</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST" class="row g-3">

  <div class="col-md-6">
    <label class="form-label">Full Name *</label>
    <input type="text" name="name" class="form-control" required>
  </div>

  <div class="col-md-6">
    <label class="form-label">Email *</label>
    <input type="email" name="email" class="form-control" required>
  </div>

  <div class="col-md-6">
    <label class="form-label">ID No./Enrl. No. * (this will be your login ID)</label>
    <input type="text" name="enrollment_no" class="form-control" required maxlength="20">
  </div>

  <div class="col-md-6">
    <label class="form-label">Mobile</label>
    <input type="text" name="mobile" class="form-control">
  </div>

  <div class="col-md-6">
    <label class="form-label">Program * (e.g. COMPUTER SCIENCE & ENGG(MTech))</label>
    <input type="text" name="program" class="form-control" required>
  </div>

  <div class="col-md-6">
    <label class="form-label">Aadhaar No.</label>
    <input type="text" name="aadhar" class="form-control">
  </div>

  <div class="col-md-6">
    <label class="form-label">Date of Birth</label>
    <input type="date" name="dob" class="form-control">
  </div>

  <div class="col-12">
    <label class="form-label">Current Address</label>
    <textarea name="address" class="form-control" rows="3"></textarea>
  </div>

  <div class="col-md-6">
    <label class="form-label">Name of Faculty Advisor</label>
    <input type="text" name="faculty_advisor" class="form-control">
  </div>

  <div class="col-md-6">
    <label class="form-label">Hosteller?</label>
    <select name="is_hosteller" class="form-select">
      <option value="N">No</option>
      <option value="Y">Yes</option>
    </select>
  </div>

  <div class="col-md-6">
    <label class="form-label">Password * (min 8 characters)</label>
    <input type="password" name="password" class="form-control" required minlength="8">
  </div>

  <div class="col-md-6">
    <label class="form-label">Confirm Password *</label>
    <input type="password" name="confirm_password" class="form-control" required>
  </div>

  <div class="col-12 mt-4">
    <button type="submit" class="btn btn-primary btn-lg">Register</button>
    <a href="/" class="btn btn-secondary btn-lg ms-3">Back to Login</a>
  </div>

</form>

</body>
</html>
